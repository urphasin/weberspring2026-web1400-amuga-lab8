<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 8 Grids</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand text-brand">My Tool</div>
      <nav class="top-nav">
        <ul>
          <li><a href="#">Dashboard</a></li>
          <li><a href="#">Assets</a></li>
          <li><a href="#">Settings</a></li>
        </ul>
      </nav>
    </header>

    <aside class="sidebar">
      <h2 class="">Library</h2>
      <ul>
        <li><a href="#">Overview</a></li>
        <li><a href="#">Images</a></li>
        <li><a href="#">Videos</a></li>
        <li><a href="#">Collections</a></li>
      </ul>
    </aside>

    <main class="main">
      <section class="panel">
        <div class="panel-header">
          <div class="panel-copy">
            <h1>Assets</h1>
            <p>Browse and organize your media library</p>
          </div>

          <div class="toolbar">
            <input type="search" name="search-bar" id="search-bar" placeholder="Search assets">
            <button type="button">Filter</button>
            <button type="button">Sort</button>
            <button type="button">Grid</button>
          </div>
        </div>

        <div class="scroll-shell">
          <div class="scroll-grid">
            <article class="card card-large">Large</article>
            <article class="card">2</article>
            <article class="card card-tall">Tall</article>
            <article class="card">4</article>
            <article class="card card-wide">Wide</article>
            <article class="card">6</article>
            <article class="card">7</article>
            <article class="card">8</article>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <i>Footer Content</i>
    </footer>
  </div>
</body>
</html>
